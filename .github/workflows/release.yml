name: Build & Release Windows EXE

# Trigger: push a tag like  v1.0.0  or  v2.3.1
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create/upload the GitHub Release

jobs:
  build-windows:
    name: Build EXE (Windows)
    runs-on: windows-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Source code
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Python environment
      # ------------------------------------------------------------------ #
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ------------------------------------------------------------------ #
      # 3. Install runtime dependencies (CPU-only — no CUDA in the exe)
      #    PyTorch is listed in requirements but is NOT used at runtime;
      #    we skip it entirely to keep the exe small (~50 MB vs >2 GB).
      # ------------------------------------------------------------------ #
      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib

      # ------------------------------------------------------------------ #
      # 4. Install PyInstaller
      # ------------------------------------------------------------------ #
      - name: Install PyInstaller
        run: pip install pyinstaller

      # ------------------------------------------------------------------ #
      # 5. Build the single-file executable
      # ------------------------------------------------------------------ #
      - name: Build EXE
        run: pyinstaller neural_network_circuit_game.spec

      # ------------------------------------------------------------------ #
      # 6. Sanity-check — make sure the file was actually produced
      # ------------------------------------------------------------------ #
      - name: Verify build output
        run: |
          if (!(Test-Path "dist\neural-network-circuit-game.exe")) {
            Write-Error "EXE not found after build!"
            exit 1
          }
          $size = (Get-Item "dist\neural-network-circuit-game.exe").Length / 1MB
          Write-Output ("EXE size: {0:N1} MB" -f $size)

      # ------------------------------------------------------------------ #
      # 7. Zip the executable so GitHub doesn't strip the .exe on download
      # ------------------------------------------------------------------ #
      - name: Package EXE into ZIP
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "neural-network-circuit-game-$tag-windows.zip"
          Compress-Archive `
            -Path "dist\neural-network-circuit-game.exe" `
            -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      # ------------------------------------------------------------------ #
      # 8. Create the GitHub Release and upload the ZIP
      # ------------------------------------------------------------------ #
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v1.0.0-beta
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
